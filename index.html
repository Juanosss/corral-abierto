<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corral Abierto - Selección de Evento</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,800;1,600&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=4.8">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Estilo Netflix - Perfiles */
        .lobby-profile-card:hover .lobby-profile-image {
            border-color: #ff5722 !important;
            transform: scale(1.06);
            box-shadow: 0 15px 35px rgba(255, 87, 34, 0.35) !important;
        }
        .lobby-profile-card:hover .lobby-profile-name {
            color: #fff !important;
        }
        .lobby-profile-card:hover .profile-glow {
            opacity: 1 !important;
        }
        .lobby-profile-card.active:active .lobby-profile-image {
            transform: scale(0.98);
        }
    </style>
</head>
<body style="margin: 0; padding: 0; background: #0d0604; overflow: hidden; width: 100vw; height: 100vh;">

    <!-- PANTALLA LOBBY SELECCIÓN DE EVENTOS (ESTILO NETFLIX) -->
    <div id="lobby-screen" style="width: 100%; height: 100%; background: radial-gradient(circle at center, #1b0e0a 0%, #0d0604 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; font-family: 'Inter', sans-serif;">
        <!-- LOGO DE CORRAL ABIERTO (RESPONSIVO Y CENTRADO) -->
        <div style="margin-bottom: 0.8rem; display: flex; align-items: center; justify-content: center; width: 100%; text-align: center; padding: 0 15px; box-sizing: border-box;">
            <span style="font-family: 'Playfair Display', serif; font-size: clamp(2.3rem, 10vw, 3.2rem); font-weight: 800; letter-spacing: -0.02em; background: linear-gradient(135deg, #ffffff 0%, #e0d5c1 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 4px 15px rgba(255,87,34,0.15)); text-transform: uppercase; text-align: center; display: inline-block; width: 100%;">Corral Abierto</span>
        </div>
        
        <h1 style="font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 600; text-align: center; margin-top: 0; margin-bottom: 3.5rem; letter-spacing: -0.01em; color: #bcaaa4; text-shadow: 0 4px 15px rgba(0,0,0,0.5); opacity: 0.85;">
            ¿Qué rodeo deseas ver hoy?
        </h1>
        
        <div class="lobby-profiles-grid" style="display: flex; gap: 28px; flex-wrap: wrap; justify-content: center; max-width: 900px; padding: 0 20px;">
            <!-- Perfiles dinámicos cargados por JS -->
            <div style="color: var(--text-muted); font-size: 1rem;">Cargando rodeos disponibles...</div>
        </div>
    </div>

    <script>
        let supabaseClient = null;
        if (typeof supabase !== 'undefined') {
            supabaseClient = supabase.createClient('https://hphtzcuwyixcxpaskprj.supabase.co', 'sb_publishable__swYk_OxwILPUBbsAk9YKQ_EEH_ZDe_');
        }

        async function loadProfiles() {
            let rodeos = [];
            if (supabaseClient) {
                try {
                    const { data, error } = await supabaseClient.from('rodeos').select('*').order('created_at', { ascending: true });
                    if (!error && data && data.length > 0) {
                        rodeos = data;
                    }
                } catch(e) {
                    console.warn("Supabase rodeos table not available, using local fallback.", e);
                }
            }

            if (rodeos.length === 0) {
                const local = localStorage.getItem('rodeos');
                if (local) {
                    rodeos = JSON.parse(local);
                } else {
                    rodeos = [
                        { id: 'champion-chile-2026', nombre: 'Champion de Chile 2026', activo: true, logo_url: 'https://www.caballoyrodeo.cl/portal_rodeo/imag/logo-rodeo.png' },
                        { id: 'clasificatorio-sur-2026', nombre: 'Clasificatorio Sur 2026', activo: false, logo_url: '' },
                        { id: 'clasificatorio-centro-2026', nombre: 'Clasificatorio Centro 2026', activo: false, logo_url: '' },
                        { id: 'clasificatorio-norte-2026', nombre: 'Clasificatorio Norte 2026', activo: false, logo_url: '' }
                    ];
                    localStorage.setItem('rodeos', JSON.stringify(rodeos));
                }
            }

            const grid = document.querySelector('.lobby-profiles-grid');
            if (grid) {
                grid.innerHTML = '';
                rodeos.forEach(rodeo => {
                    const isChampion = rodeo.id === 'champion-chile-2026';
                    if (rodeo.activo) {
                        grid.innerHTML += `
                            <div class="lobby-profile-card active" onclick="selectRodeo('${rodeo.id}')" style="display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1); width: 160px;">
                                <div class="lobby-profile-image" style="width: 140px; height: 140px; border-radius: 8px; border: 3px solid rgba(255,255,255,0.1); background: #1c1412 url('${rodeo.logo_url || 'https://www.caballoyrodeo.cl/portal_rodeo/imag/logo-rodeo.png'}') no-repeat center; background-size: 70%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(0,0,0,0.6); position: relative; overflow: hidden; transition: all 0.25s;">
                                    <div class="profile-glow" style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; box-shadow: inset 0 0 20px rgba(255,87,34,0.6); opacity: 0; transition: opacity 0.25s;"></div>
                                </div>
                                <span class="lobby-profile-name" style="margin-top: 12px; font-size: 0.95rem; font-weight: 600; color: #bcaaa4; text-align: center; transition: color 0.2s;">${rodeo.nombre}</span>
                            </div>
                        `;
                    } else {
                        grid.innerHTML += `
                            <div class="lobby-profile-card locked" style="display: flex; flex-direction: column; align-items: center; cursor: not-allowed; width: 160px; opacity: 0.45;">
                                <div class="lobby-profile-image" style="width: 140px; height: 140px; border-radius: 8px; border: 3px solid rgba(255,255,255,0.05); background: #110907; display: flex; align-items: center; justify-content: center; position: relative;">
                                    <svg style="width: 32px; height: 32px; fill: rgba(255,255,255,0.4);" viewBox="0 0 24 24">
                                        <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                                    </svg>
                                </div>
                                <span class="lobby-profile-name" style="margin-top: 12px; font-size: 0.95rem; font-weight: 500; color: rgba(255,255,255,0.4); text-align: center;">${rodeo.nombre}</span>
                            </div>
                        `;
                    }
                });
            }
        }

        function selectRodeo(rodeoId) {
            sessionStorage.setItem('selectedRodeo', rodeoId);
            const folderName = rodeoId === 'champion-chile-2026' ? 'champion-chile' : rodeoId;
            window.location.href = `./${folderName}/index.html`;
        }

        // Cargar perfiles al iniciar
        window.addEventListener('DOMContentLoaded', loadProfiles);
    </script>
</body>
</html>
